name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
  delete:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'create-template'
        type: choice
        options:
          - create-template
          - demo-full-cycle

env:
  BASTION_HOST: 178.104.26.115
  PROXMOX_HOST: 10.2.0.2
  ANSIBLE_HOST_KEY_CHECKING: "False"

# Serialize all Proxmox operations to avoid race conditions
concurrency:
  group: proxmox-operations
  cancel-in-progress: false

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 0: Create Template — manual trigger only
  # Run once (or when base image needs rebuilding).
  # Creates golden Ubuntu 22.04 template (VM 9000) on Proxmox.
  # All branch and production VMs are cloned from this template.
  # ──────────────────────────────────────────────────────────
  create-template:
    name: Create Golden VM Template
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-template'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 -c "import os; k=os.environ['SSH_KEY'].replace('\r',''); k=k.replace('\\n','\n') if '\n' not in k else k; open(os.path.expanduser('~/.ssh/devops-miles-key'),'w').write(k if k.endswith('\n') else k+'\n')"
          chmod 600 ~/.ssh/devops-miles-key
          cat > ~/.ssh/config << EOF
          Host ${{ env.BASTION_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host ${{ env.PROXMOX_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p ${{ env.BASTION_HOST }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify bastion is reachable
        run: nc -zv -w 5 ${{ env.BASTION_HOST }} 22

      - name: Create golden VM template on Proxmox
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini create_template.yml \
            --private-key ~/.ssh/devops-miles-key

      - name: Write summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### Golden VM Template Ready

          | Field       | Value |
          |-------------|-------|
          | Template ID | \`9000\` |
          | Name        | \`debian-12-app-template\` |
          | Base Image  | Debian 12 (Bookworm) cloud image |

          Branch and production VMs will now clone from this template.
          EOF

  # ──────────────────────────────────────────────────────────
  # JOB 1: Test — run on every push (branch and master)
  # Must pass before any deploy job runs.
  # ──────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: app
        run: pip install -q -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: app
        run: |
          python -m pytest tests/ -q --tb=short \
            --cov=. --cov-report=term-missing --cov-report=html:coverage-report \
            --junitxml=test-results.xml \
            --cov-fail-under=80 2>&1 | tee /tmp/pytest-output.txt

      - name: Write test summary
        if: always()
        run: tail -5 /tmp/pytest-output.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/test-results.xml
            app/coverage-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 2: Branch Deploy — triggered on push to any non-master branch
  # Creates a preview VM per branch (idempotent: skips if VM already exists)
  # ──────────────────────────────────────────────────────────
  branch-deploy:
    name: Deploy Branch VM (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref != 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 -c "import os; k=os.environ['SSH_KEY'].replace('\r',''); k=k.replace('\\n','\n') if '\n' not in k else k; open(os.path.expanduser('~/.ssh/devops-miles-key'),'w').write(k if k.endswith('\n') else k+'\n')"
          chmod 600 ~/.ssh/devops-miles-key
          cat > ~/.ssh/config << EOF
          Host bastion
            HostName ${{ env.BASTION_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host ${{ env.PROXMOX_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p bastion

          Host 192.168.100.*
            User debian
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p ${{ env.PROXMOX_HOST }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify bastion is reachable
        run: nc -zv -w 5 ${{ env.BASTION_HOST }} 22

      - name: Verify golden template exists on Proxmox
        run: |
          ssh -i ~/.ssh/devops-miles-key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="ssh -i ~/.ssh/devops-miles-key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@${{ env.BASTION_HOST }}" \
            root@${{ env.PROXMOX_HOST }} "qm status 9000" || \
            (echo "::error::Template 9000 not found on Proxmox. Push a change to app/requirements.txt or ansible/create_template.yml on master to trigger the 'Build Golden Image' workflow, or run it manually." && exit 1)

      - name: Compute branch VM parameters
        id: vm_params
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          BRANCH_HASH=$(echo -n "$BRANCH_NAME" | cksum | awk '{print $1}')
          VM_ID=$((1001 + (BRANCH_HASH % 7999)))
          VM_IP="192.168.100.$((20 + (BRANCH_HASH % 235)))"
          VM_NAME="branch-$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | tr '/_' '--' | cut -c1-20 | sed 's/-*$//')"
          echo "vm_id=${VM_ID}"     >> $GITHUB_OUTPUT
          echo "vm_ip=${VM_IP}"     >> $GITHUB_OUTPUT
          echo "vm_name=${VM_NAME}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Create branch VM in Proxmox
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini proxmox_create_vm.yml \
            --private-key ~/.ssh/devops-miles-key \
            --extra-vars "vm_id=${{ steps.vm_params.outputs.vm_id }} \
                          vm_ip=${{ steps.vm_params.outputs.vm_ip }} \
                          vm_name=${{ steps.vm_params.outputs.vm_name }}" \
            2>&1 | tee /tmp/create-vm.log

      - name: Write dynamic inventory for branch VM
        run: |
          cat > /tmp/branch_inventory.ini << EOF
          [app_vm]
          branch_app ansible_host=${{ steps.vm_params.outputs.vm_ip }} ansible_user=debian ansible_ssh_private_key_file=~/.ssh/devops-miles-key
          EOF

      - name: Deploy app to branch VM
        working-directory: ansible
        run: |
          ansible-playbook -i /tmp/branch_inventory.ini app_deploy.yml \
            --private-key ~/.ssh/devops-miles-key \
            2>&1 | tee /tmp/deploy-app.log

      - name: Collect app logs from VM
        if: always()
        run: |
          ssh ${{ steps.vm_params.outputs.vm_ip }} \
            "sudo journalctl -u miles-app --no-pager -n 50 2>/dev/null || echo 'No app logs yet'" \
            > /tmp/app-journal.log 2>&1 || true
          ssh ${{ steps.vm_params.outputs.vm_ip }} \
            "curl -s http://127.0.0.1:5000/healthz 2>/dev/null || echo 'healthz unreachable'" \
            > /tmp/smoke-test-result.json 2>&1 || true

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-deploy-logs-${{ steps.vm_params.outputs.vm_id }}
          path: |
            /tmp/create-vm.log
            /tmp/deploy-app.log
            /tmp/app-journal.log
            /tmp/smoke-test-result.json
          retention-days: 7

      - name: Write deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### Branch Preview Deployment Ready

          | Field    | Value |
          |----------|-------|
          | Branch   | \`${{ steps.vm_params.outputs.branch }}\` |
          | VM ID    | \`${{ steps.vm_params.outputs.vm_id }}\` |
          | VM IP    | \`${{ steps.vm_params.outputs.vm_ip }}\` |
          | VM Name  | \`${{ steps.vm_params.outputs.vm_name }}\` |

          **Access the app via SSH tunnel:**
          \`\`\`bash
          ssh -i devops-miles-ssh-key -L 5000:${{ steps.vm_params.outputs.vm_ip }}:5000 -J root@${{ env.BASTION_HOST }} -N root@${{ env.PROXMOX_HOST }}
          \`\`\`
          Then open: http://localhost:5000

          _This VM will be destroyed automatically when the branch is deleted._
          EOF

  # ──────────────────────────────────────────────────────────
  # JOB 2: Branch Cleanup — triggered when any non-master branch is deleted
  # ──────────────────────────────────────────────────────────
  branch-cleanup:
    name: Destroy Branch VM (${{ github.event.ref }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 -c "import os; k=os.environ['SSH_KEY'].replace('\r',''); k=k.replace('\\n','\n') if '\n' not in k else k; open(os.path.expanduser('~/.ssh/devops-miles-key'),'w').write(k if k.endswith('\n') else k+'\n')"
          chmod 600 ~/.ssh/devops-miles-key
          cat > ~/.ssh/config << EOF
          Host bastion
            HostName ${{ env.BASTION_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host ${{ env.PROXMOX_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p bastion
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify bastion is reachable
        run: nc -zv -w 5 ${{ env.BASTION_HOST }} 22

      - name: Compute branch VM ID
        id: vm_params
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          BRANCH_HASH=$(echo -n "$BRANCH_NAME" | cksum | awk '{print $1}')
          VM_ID=$((1001 + (BRANCH_HASH % 7999)))
          echo "vm_id=${VM_ID}"     >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Destroy branch VM
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini destroy_vm.yml \
            --private-key ~/.ssh/devops-miles-key \
            --extra-vars "vm_id=${{ steps.vm_params.outputs.vm_id }}" \
            2>&1 | tee /tmp/destroy-vm.log

      - name: Validate VM was destroyed
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini validate_cleanup.yml \
            --private-key ~/.ssh/devops-miles-key \
            --extra-vars "vm_id=${{ steps.vm_params.outputs.vm_id }}" \
            2>&1 | tee /tmp/validate-cleanup.log

      - name: Upload cleanup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-cleanup-logs-${{ steps.vm_params.outputs.vm_id }}
          path: |
            /tmp/destroy-vm.log
            /tmp/validate-cleanup.log
          retention-days: 7

      - name: Write cleanup summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### Branch VM Destroyed

          | Field  | Value |
          |--------|-------|
          | Branch | \`${{ steps.vm_params.outputs.branch }}\` |
          | VM ID  | \`${{ steps.vm_params.outputs.vm_id }}\` |
          EOF

  # ──────────────────────────────────────────────────────────
  # JOB 3: Production Deploy — triggered on push to master
  # Creates VM if it doesn't exist, then redeploys app in-place
  # ──────────────────────────────────────────────────────────
  production-deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 -c "import os; k=os.environ['SSH_KEY'].replace('\r',''); k=k.replace('\\n','\n') if '\n' not in k else k; open(os.path.expanduser('~/.ssh/devops-miles-key'),'w').write(k if k.endswith('\n') else k+'\n')"
          chmod 600 ~/.ssh/devops-miles-key
          cat > ~/.ssh/config << EOF
          Host bastion
            HostName ${{ env.BASTION_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host ${{ env.PROXMOX_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p bastion

          Host 192.168.100.*
            User debian
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p ${{ env.PROXMOX_HOST }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify bastion is reachable
        run: nc -zv -w 5 ${{ env.BASTION_HOST }} 22

      - name: Verify golden template exists on Proxmox
        run: |
          ssh -i ~/.ssh/devops-miles-key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="ssh -i ~/.ssh/devops-miles-key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@${{ env.BASTION_HOST }}" \
            root@${{ env.PROXMOX_HOST }} "qm status 9000" || \
            (echo "::error::Template 9000 not found on Proxmox. Run the 'Build Golden Image' workflow first." && exit 1)

      - name: Create production VM if it does not exist
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini proxmox_create_vm.yml \
            --private-key ~/.ssh/devops-miles-key \
            --extra-vars "vm_id=100 vm_ip=192.168.100.10 vm_name=master-vm" \
            2>&1 | tee /tmp/create-prod-vm.log

      - name: Deploy app to production VM
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini app_deploy.yml \
            --private-key ~/.ssh/devops-miles-key \
            2>&1 | tee /tmp/deploy-prod-app.log

      - name: Collect production app logs
        if: always()
        run: |
          ssh 192.168.100.10 \
            "sudo journalctl -u miles-app --no-pager -n 100 2>/dev/null || echo 'No app logs yet'" \
            > /tmp/prod-app-journal.log 2>&1 || true
          ssh 192.168.100.10 \
            "curl -s http://127.0.0.1:5000/healthz 2>/dev/null || echo 'healthz unreachable'" \
            > /tmp/prod-smoke-test.json 2>&1 || true

      - name: Upload production deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-logs-${{ github.sha }}
          path: |
            /tmp/create-prod-vm.log
            /tmp/deploy-prod-app.log
            /tmp/prod-app-journal.log
            /tmp/prod-smoke-test.json
          retention-days: 30

      - name: Write production summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### Production Deploy Complete

          | Field    | Value |
          |----------|-------|
          | VM ID    | \`100\` |
          | VM IP    | \`192.168.100.10\` |
          | Commit   | \`${{ github.sha }}\` |

          Smoke test and app logs collected as artifacts.
          EOF

  # ──────────────────────────────────────────────────────────
  # JOB 5: Demo Full Cycle — manual trigger only
  # Runs the complete 5-step pipeline in one shot:
  #   1. Spin up a fresh VM from template
  #   2. Deploy the web app
  #   3. Run smoke test
  #   4. Collect and store logs
  #   5. Tear down the VM
  # ──────────────────────────────────────────────────────────
  demo-full-cycle:
    name: Demo Full Pipeline Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'demo-full-cycle'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 -c "import os; k=os.environ['SSH_KEY'].replace('\r',''); k=k.replace('\\n','\n') if '\n' not in k else k; open(os.path.expanduser('~/.ssh/devops-miles-key'),'w').write(k if k.endswith('\n') else k+'\n')"
          chmod 600 ~/.ssh/devops-miles-key
          cat > ~/.ssh/config << EOF
          Host bastion
            HostName ${{ env.BASTION_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host ${{ env.PROXMOX_HOST }}
            User root
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p bastion

          Host 192.168.100.*
            User debian
            IdentityFile ~/.ssh/devops-miles-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh -W %h:%p ${{ env.PROXMOX_HOST }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify bastion is reachable
        run: nc -zv -w 5 ${{ env.BASTION_HOST }} 22

      - name: Verify golden template exists
        run: |
          ssh -i ~/.ssh/devops-miles-key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="ssh -i ~/.ssh/devops-miles-key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@${{ env.BASTION_HOST }}" \
            root@${{ env.PROXMOX_HOST }} "qm status 9000" || \
            (echo "::error::Template 9000 not found. Run 'Build Golden Image' workflow first." && exit 1)

      # ── Step 1: Spin up a fresh VM ──
      - name: "Step 1/5: Spin up VM from template"
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini proxmox_create_vm.yml \
            --private-key ~/.ssh/devops-miles-key \
            --extra-vars "vm_id=9999 vm_ip=192.168.100.250 vm_name=demo-full-cycle" \
            2>&1 | tee /tmp/demo-create-vm.log

      - name: Write dynamic inventory for demo VM
        run: |
          cat > /tmp/demo_inventory.ini << EOF
          [app_vm]
          demo_app ansible_host=192.168.100.250 ansible_user=debian ansible_ssh_private_key_file=~/.ssh/devops-miles-key
          EOF

      # ── Step 2: Deploy app ──
      - name: "Step 2/5: Deploy web app with backend DB"
        working-directory: ansible
        run: |
          ansible-playbook -i /tmp/demo_inventory.ini app_deploy.yml \
            --private-key ~/.ssh/devops-miles-key \
            2>&1 | tee /tmp/demo-deploy-app.log

      # ── Step 3: Smoke test ──
      - name: "Step 3/5: Run smoke test"
        run: |
          echo "--- Smoke Test Results ---" > /tmp/demo-smoke-test.log
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/demo-smoke-test.log
          echo "" >> /tmp/demo-smoke-test.log

          echo "GET / (homepage):" >> /tmp/demo-smoke-test.log
          ssh 192.168.100.250 "curl -s -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' http://127.0.0.1:5000/" >> /tmp/demo-smoke-test.log 2>&1

          echo "" >> /tmp/demo-smoke-test.log
          echo "POST / (submit name):" >> /tmp/demo-smoke-test.log
          ssh 192.168.100.250 "curl -s -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' -X POST -d 'name=DemoUser' http://127.0.0.1:5000/" >> /tmp/demo-smoke-test.log 2>&1

          echo "" >> /tmp/demo-smoke-test.log
          echo "GET /healthz:" >> /tmp/demo-smoke-test.log
          ssh 192.168.100.250 "curl -s http://127.0.0.1:5000/healthz" >> /tmp/demo-smoke-test.log 2>&1

          echo "" >> /tmp/demo-smoke-test.log
          cat /tmp/demo-smoke-test.log

      # ── Step 4: Collect logs ──
      - name: "Step 4/5: Collect and store logs"
        if: always()
        run: |
          ssh 192.168.100.250 \
            "sudo journalctl -u miles-app --no-pager -n 100 2>/dev/null || echo 'No app logs'" \
            > /tmp/demo-app-journal.log 2>&1 || true

      - name: Upload demo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-full-cycle-${{ github.run_id }}
          path: |
            /tmp/demo-create-vm.log
            /tmp/demo-deploy-app.log
            /tmp/demo-smoke-test.log
            /tmp/demo-app-journal.log
          retention-days: 30

      # ── Step 5: Tear down ──
      - name: "Step 5/5: Tear down VM"
        if: always()
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini destroy_vm.yml \
            --private-key ~/.ssh/devops-miles-key \
            --extra-vars "vm_id=9999" \
            2>&1 | tee /tmp/demo-destroy-vm.log

      - name: Validate VM was destroyed
        if: always()
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini validate_cleanup.yml \
            --private-key ~/.ssh/devops-miles-key \
            --extra-vars "vm_id=9999" || true

      - name: Write demo summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### Demo: Full Pipeline Cycle Complete

          | Step | Action | Status |
