---
# App Deployment Playbook
#
# Deploys Flask web app to the app VM inside Proxmox
# Access via: ssh -L 5000:192.168.100.10:5000 -J root@178.104.26.115 root@10.2.0.2
#
# Usage:
#   ansible-playbook -i inventory.ini app_deploy.yml

- hosts: "{{ target_host | default('app_vm') }}"
  become: yes
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ProxyJump="root@178.104.26.115,root@10.2.0.2"'
    app_dir: /opt/devops-miles-app
    app_user: ubuntu

  tasks:
    - name: Install Python and DB packages
      apt:
        name:
          - python3
          - python3-pip
          - sqlite3
        state: present
        update_cache: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy app files
      copy:
        src: ../app/
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Install app requirements
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        executable: pip3

    - name: Run DB migrations
      command: python3 {{ app_dir }}/migrate.py
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"

    - name: Create systemd service for app
      copy:
        dest: /etc/systemd/system/devops-miles-app.service
        content: |
          [Unit]
          Description=DevOps Miles Flask App
          After=network.target

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/python3 {{ app_dir }}/app.py
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start app service
      systemd:
        name: devops-miles-app
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for app to be ready
      wait_for:
        host: 127.0.0.1
        port: 5000
        timeout: 30

    - name: Smoke test
      uri:
        url: http://127.0.0.1:5000/
        return_content: yes
      register: result

    - name: Smoke test result
      debug:
        msg: "App is running. HTTP status: {{ result.status }}"
