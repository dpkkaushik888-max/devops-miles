---
# App Deployment Playbook
#
# Deploys Flask web app to a VM cloned from the Debian 12 template.
# All dependencies (python3, flask, sqlite3) are pre-installed in the
# template — this playbook only copies files and restarts the service.
#
# Usage:
#   ansible-playbook -i inventory.ini app_deploy.yml

- hosts: "{{ target_host | default('app_vm') }}"
  become: yes
  vars:
    app_dir: /opt/devops-miles-app
    app_user: debian

  tasks:
    - name: Ensure app directory exists and is owned by app user
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy app files
      copy:
        src: ../app/
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Run DB migrations
      command: python3 {{ app_dir }}/migrate.py
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"

    - name: Create systemd service for app
      copy:
        dest: /etc/systemd/system/devops-miles-app.service
        content: |
          [Unit]
          Description=DevOps Miles Flask App
          After=network.target

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/gunicorn -w 2 -b 0.0.0.0:5000 --chdir {{ app_dir }} app:app
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and restart app service
      systemd:
        name: devops-miles-app
        enabled: yes
        state: restarted
        daemon_reload: yes

    - name: Wait for app to be ready
      wait_for:
        host: 127.0.0.1
        port: 5000
        timeout: 30

    - name: Smoke test
      uri:
        url: http://127.0.0.1:5000/
        return_content: yes
      register: result

    - name: Smoke test result
      debug:
        msg: "App is running. HTTP status: {{ result.status }}"
