---
# Proxmox Golden Template Playbook
#
# Run ONCE to create a reusable Debian 12 template (VM ID 9000) with all
# app dependencies pre-installed. Cloning from this template cuts VM
# provisioning from ~5 min to ~30 seconds and deploy to just file copy + restart.
#
# Base OS: Debian 12 (Bookworm) — lighter than Ubuntu (~300MB vs ~500MB),
#          same apt/systemd ecosystem, consistent with Proxmox host OS.
#
# Pre-baked dependencies: python3, python3-pip, sqlite3, flask, qemu-guest-agent
#
# Usage:
#   ansible-playbook -i inventory.ini create_template.yml
#
# Safe to re-run: skips all steps if template 9000 already exists.

- hosts: proxmox_hosts
  become: yes
  vars:
    template_id: 9000
    template_name: debian-12-app-template
    cloud_image_url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2"
    cloud_image_path: "/var/lib/vz/template/iso/debian-12-generic-amd64.qcow2"
    vm_memory: 2048
    vm_cores: 2
    vm_disk: "10G"
    vm_user: debian

  tasks:
    - name: Check if template {{ template_id }} already exists
      command: qm status {{ template_id }}
      register: template_status
      ignore_errors: yes
      changed_when: false

    - name: Template already exists — skipping creation
      debug:
        msg: "Template {{ template_id }} ({{ template_name }}) already exists. Nothing to do."
      when: template_status.rc == 0

    # ── Everything below only runs if template does not exist ──

    - name: Ensure required tools are installed
      apt:
        name:
          - libguestfs-tools
          - wget
        state: present
        update_cache: yes
      when: template_status.rc != 0

    - name: Download Debian 12 cloud image
      get_url:
        url: "{{ cloud_image_url }}"
        dest: "{{ cloud_image_path }}"
        mode: "0644"
      when: template_status.rc != 0

    - name: Bake app dependencies into image
      command: >
        virt-customize -a {{ cloud_image_path }}
        --update
        --install qemu-guest-agent,python3,python3-pip,sqlite3
        --run-command 'python3 -m pip install --break-system-packages flask==3.0.3'
        --run-command 'systemctl enable qemu-guest-agent'
        --run-command 'mkdir -p /opt/devops-miles-app && chown debian:debian /opt/devops-miles-app'
      when: template_status.rc != 0

    - name: Create base VM for template
      command: >
        qm create {{ template_id }}
        --name {{ template_name }}
        --memory {{ vm_memory }}
        --cores {{ vm_cores }}
        --net0 virtio,bridge=vmbr0
        --serial0 socket
        --vga serial0
        --agent enabled=1
        --kvm 0
      when: template_status.rc != 0

    - name: Import cloud image disk into template VM
      command: >
        qm importdisk {{ template_id }} {{ cloud_image_path }} local --format qcow2
      when: template_status.rc != 0

    - name: Attach disk to template VM
      command: >
        qm set {{ template_id }}
        --scsihw virtio-scsi-pci
        --scsi0 local:{{ template_id }}/vm-{{ template_id }}-disk-0.qcow2
      when: template_status.rc != 0

    - name: Resize template disk
      command: qm resize {{ template_id }} scsi0 {{ vm_disk }}
      when: template_status.rc != 0

    - name: Attach cloud-init drive to template VM
      command: >
        qm set {{ template_id }}
        --ide2 local:cloudinit
        --boot c
        --bootdisk scsi0
        --ciuser {{ vm_user }}
        --nameserver 8.8.8.8
      when: template_status.rc != 0

    - name: Convert VM to template
      command: qm template {{ template_id }}
      when: template_status.rc != 0

    - name: Template created successfully
      debug:
        msg: "Template {{ template_id }} ({{ template_name }}) is ready. Python3 + Flask + sqlite3 pre-installed."
      when: template_status.rc != 0
