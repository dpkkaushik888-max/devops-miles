---
# Proxmox VM Provisioning Playbook
#
# Clones a VM from the golden template (ID 9000) and configures it
# with cloud-init (IP, SSH key, hostname). Much faster than building
# from scratch — provisioning takes ~30s instead of ~5 minutes.
#
# Requires: create_template.yml to have been run at least once.
#
# Usage:
#   ansible-playbook -i inventory.ini proxmox_create_vm.yml \
#     --extra-vars "vm_id=1001 vm_ip=192.168.100.50 vm_name=branch-my-feature"

- hosts: proxmox_hosts
  become: yes
  vars:
    template_id: 9000
    vm_id: 100
    vm_name: master-vm
    vm_ip: "192.168.100.10"
    vm_gw: "192.168.100.1"
    vm_user: ubuntu
    ssh_pub_key: "{{ lookup('file', '../devops-miles-ssh-key.pub') }}"

  tasks:
    - name: Check if VM {{ vm_id }} already exists
      command: qm status {{ vm_id }}
      register: vm_status
      ignore_errors: yes
      changed_when: false

    - name: VM {{ vm_id }} already exists — skipping clone
      debug:
        msg: "VM {{ vm_id }} ({{ vm_name }}) already exists. Skipping clone."
      when: vm_status.rc == 0

    - name: Verify template {{ template_id }} exists before cloning
      command: qm status {{ template_id }}
      register: template_check
      when: vm_status.rc != 0

    - name: Fail if template is missing
      fail:
        msg: "Template {{ template_id }} not found. Run create_template.yml first."
      when: vm_status.rc != 0 and template_check.rc != 0

    - name: Clone VM {{ vm_id }} from template {{ template_id }}
      command: >
        qm clone {{ template_id }} {{ vm_id }}
        --name {{ vm_name }}
        --full
      when: vm_status.rc != 0

    - name: Write SSH public key to temp file
      copy:
        content: "{{ ssh_pub_key }}"
        dest: /tmp/vm_ssh_key.pub
        mode: "0644"
      when: vm_status.rc != 0

    - name: Configure cloud-init on cloned VM
      command: >
        qm set {{ vm_id }}
        --ciuser {{ vm_user }}
        --sshkeys /tmp/vm_ssh_key.pub
        --ipconfig0 ip={{ vm_ip }}/24,gw={{ vm_gw }}
        --nameserver 8.8.8.8
      when: vm_status.rc != 0

    - name: Ensure NAT and IP forwarding are configured on Proxmox host
      iptables:
        table: nat
        chain: POSTROUTING
        source: "192.168.100.0/24"
        out_interface: enp7s0
        jump: MASQUERADE

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: yes

    - name: Start VM {{ vm_id }}
      command: qm start {{ vm_id }}
      when: vm_status.rc != 0

    - name: Wait for VM SSH to become available
      wait_for:
        host: "{{ vm_ip }}"
        port: 22
        delay: 15
        timeout: 90
      when: vm_status.rc != 0

    - name: VM {{ vm_name }} is ready
      debug:
        msg: "VM {{ vm_id }} ({{ vm_name }}) is up at {{ vm_ip }}"
